name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump to apply when no explicit version is provided."
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: "Exact version to publish or rebuild, without the leading v. Leave blank to create the next version."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_OPTIONS: "--max-old-space-size=4096"
  NODE_VERSION: "22"
  WAILS_VERSION: v2.12.0

jobs:
  prepare:
    name: Resolve Release Version
    runs-on: ubuntu-latest

    outputs:
      create_tag: ${{ steps.version.outputs.create_tag }}
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        env:
          RELEASE_BUMP: ${{ github.event.inputs.bump }}
          RELEASE_VERSION_INPUT: ${{ github.event.inputs.version }}
        run: .github/scripts/resolve-release-version.ps1

  build:
    name: Build ${{ matrix.label }}
    needs: prepare
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x64
            os: ubuntu-22.04
            platform: linux/amd64
            artifact: linux-amd64
          - label: Windows x64
            os: windows-latest
            platform: windows/amd64
            artifact: windows-amd64
          - label: macOS universal
            os: macos-latest
            platform: darwin/universal
            artifact: macos-universal

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Checkout existing release tag
        if: github.event_name == 'workflow_dispatch' && needs.prepare.outputs.create_tag == 'false'
        run: git checkout --force "refs/tags/${{ needs.prepare.outputs.tag }}"

      - name: Install Linux Wails dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}
          $goBin = Join-Path (go env GOPATH) "bin"
          $goBin | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Audit frontend dependencies
        run: npm --prefix frontend audit --audit-level=high

      - name: Go tests
        run: go test ./...

      - name: Stamp release metadata
        run: node .github/scripts/sync-release-version.mjs "${{ needs.prepare.outputs.version }}"

      - name: Build native application
        run: wails build -platform ${{ matrix.platform }} -clean -trimpath -o Chutes-E2EE-Chat

      - name: Package release artifact
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: .github/scripts/package-release-artifacts.ps1 -Tag $env:RELEASE_TAG -BinaryName Chutes-E2EE-Chat

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.artifact }}
          if-no-files-found: error
          path: release/*

  publish:
    name: Publish GitHub Release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - name: Generate checksums
        run: |
          $files = Get-ChildItem -LiteralPath release -File | Sort-Object Name
          if (-not $files) {
            throw "No release files were downloaded."
          }

          $lines = foreach ($file in $files) {
            $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $file.FullName
            "{0}  {1}" -f $hash.Hash.ToLowerInvariant(), $file.Name
          }
          Set-Content -LiteralPath release/SHA256SUMS.txt -Value $lines
          Get-Content -LiteralPath release/SHA256SUMS.txt

      - name: Create release tag
        if: needs.prepare.outputs.create_tag == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.prepare.outputs.tag }}" -m "Release ${{ needs.prepare.outputs.tag }}"
          git push origin "${{ needs.prepare.outputs.tag }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Chutes E2EE Chat ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          make_latest: true
          files: release/*
