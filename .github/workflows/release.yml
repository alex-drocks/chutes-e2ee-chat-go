name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump to apply when no explicit version is provided."
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: "Exact version to publish or rebuild, without the leading v. Leave blank to create the next version."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_OPTIONS: "--max-old-space-size=4096"
  NODE_VERSION: "22"
  WAILS_VERSION: v2.12.0

jobs:
  prepare:
    name: Resolve Release Version
    runs-on: ubuntu-latest

    outputs:
      create_tag: ${{ steps.version.outputs.create_tag }}
      make_latest: ${{ steps.version.outputs.make_latest }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      release_name: ${{ steps.version.outputs.release_name }}
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        env:
          RELEASE_BUMP: ${{ github.event.inputs.bump }}
          RELEASE_VERSION_INPUT: ${{ github.event.inputs.version }}
        run: .github/scripts/resolve-release-version.ps1

  build:
    name: Build Windows Release
    needs: prepare
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Checkout existing release tag
        if: github.event_name == 'workflow_dispatch' && needs.prepare.outputs.create_tag == 'false'
        run: git checkout --force "refs/tags/${{ needs.prepare.outputs.tag }}"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}
          $goBin = Join-Path (go env GOPATH) "bin"
          $goBin | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Audit frontend dependencies
        run: npm --prefix frontend audit --audit-level=high

      - name: Go tests
        run: go test ./...

      - name: Stamp release metadata
        run: node .github/scripts/sync-release-version.mjs "${{ needs.prepare.outputs.version }}"

      - name: Build Windows executable
        run: wails build -platform windows/amd64 -clean -trimpath -o Chutes-E2EE-Chat

      - name: Package release artifact
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: .github/scripts/package-release-artifacts.ps1 -Tag $env:RELEASE_TAG -BinaryName Chutes-E2EE-Chat

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-release-${{ needs.prepare.outputs.tag }}
          if-no-files-found: error
          path: release/*

  publish:
    name: Publish GitHub Release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: windows-release-*
          path: release
          merge-multiple: true

      - name: Generate checksums
        run: |
          $files = Get-ChildItem -LiteralPath release -File | Sort-Object Name
          if (-not $files) {
            throw "No release files were downloaded."
          }

          $lines = foreach ($file in $files) {
            $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $file.FullName
            "{0}  {1}" -f $hash.Hash.ToLowerInvariant(), $file.Name
          }
          Set-Content -LiteralPath release/SHA256SUMS.txt -Value $lines
          Get-Content -LiteralPath release/SHA256SUMS.txt

      - name: Create release tag
        if: needs.prepare.outputs.create_tag == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.prepare.outputs.tag }}" -m "${{ needs.prepare.outputs.release_name }}"
          git push origin "refs/tags/${{ needs.prepare.outputs.tag }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          make_latest: ${{ needs.prepare.outputs.make_latest }}
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          files: release/*
