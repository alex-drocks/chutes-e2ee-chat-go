name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: "--max-old-space-size=4096"
  NODE_VERSION: "22"
  WAILS_VERSION: v2.12.0

jobs:
  check:
    name: Check (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux/amd64
          - os: windows-latest
            platform: windows/amd64
          - os: macos-latest
            platform: darwin/universal

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux Wails dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}
          $goBin = Join-Path (go env GOPATH) "bin"
          $goBin | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Audit frontend dependencies
        run: npm --prefix frontend audit --audit-level=high

      - name: Verify Go modules are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Go tests
        run: go test ./...

      - name: Wails doctor
        run: wails doctor

      - name: Wails production smoke build
        run: wails build -platform ${{ matrix.platform }} -clean -trimpath -nopackage -o Chutes-E2EE-Chat

      - name: Verify generated Wails bindings are committed
        run: git diff --exit-code -- frontend/wailsjs go.mod go.sum
