name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: "--max-old-space-size=4096"
  NODE_VERSION: "22"
  WAILS_VERSION: v2.12.0

jobs:
  windows:
    name: Windows CI Build
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}
          $goBin = Join-Path (go env GOPATH) "bin"
          $goBin | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Audit frontend dependencies
        run: npm --prefix frontend audit --audit-level=high

      - name: Verify Go modules are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Go tests
        run: go test ./...

      - name: Wails doctor
        run: wails doctor

      - name: Build Windows executable
        run: wails build -platform windows/amd64 -clean -trimpath -o Chutes-E2EE-Chat

      - name: Verify generated Wails bindings are committed
        run: git diff --exit-code -- frontend/wailsjs go.mod go.sum

      - name: Package CI executable
        run: .github/scripts/package-release-artifacts.ps1 -Tag "ci-${{ github.run_number }}" -BinaryName Chutes-E2EE-Chat

      - name: Upload Windows executable
        uses: actions/upload-artifact@v7
        with:
          name: Chutes-E2EE-Chat-windows-${{ github.run_number }}
          if-no-files-found: error
          path: release/*.exe
